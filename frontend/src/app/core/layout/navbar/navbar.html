  <div class="nav-logo" routerLink="/">
    <div class="nav-logo-icon">🕌</div>
    <div class="nav-logo-text">Mourid<span>Connect</span></div>
  </div>

  <ul class="nav-links">
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Accueil</a></li>
    <li><a routerLink="/souk" routerLinkActive="active">Souk</a></li>
    <li><a href="#">Dahira</a></li>
    <li><a href="#">Académie</a></li>

  </ul>

      <span class="nav-user">{{ auth.currentUser()?.name }}</span>

    } @else {
      <button class="btn-outline">Connexion</button>
      <button class="btn-solid">S'inscrire</button>
    }
  </div>
